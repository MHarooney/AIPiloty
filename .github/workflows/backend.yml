name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install test extras
        run: pip install pytest-cov pytest-json-report

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            -m "not slow" \
            --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing \
            --junitxml=test-results.xml
        env:
          TESTING: "1"
          DATABASE_URL: "sqlite+aiosqlite://"
          JWT_SECRET: "ci-test-secret-32-chars-minimum-ok"
          API_KEY: "test-api-key-for-ci"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 14

      - name: Check imports
        run: python -c "from app.main import create_app; print('Import OK')"
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          JWT_SECRET: "ci-test-secret"
          API_KEYS: "test-key"
