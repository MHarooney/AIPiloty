<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'unsafe-inline'; img-src {{cspSource}} data:;" />
  <title>Chat</title>
  <style>
    :root {
      --bg: var(--vscode-sideBar-background, #181818);
      --fg: var(--vscode-foreground, #cccccc);
      --muted: var(--vscode-descriptionForeground, #9d9d9d);
      --border: var(--vscode-panel-border, #2b2b2b);
      --input-bg: var(--vscode-input-background, #313131);
      --input-fg: var(--vscode-input-foreground, #cccccc);
      --btn-bg: var(--vscode-button-background, #0e639c);
      --btn-fg: var(--vscode-button-foreground, #fff);
      --btn-hover: var(--vscode-button-hoverBackground, #1177bb);
      --list-hover: var(--vscode-list-hoverBackground, #2a2d2e);
      --widget: var(--vscode-editorWidget-background, #252526);
      --accent: var(--vscode-focusBorder, #007fd4);
      --warn: var(--vscode-editorWarning-foreground, #cca700);
      --error: var(--vscode-errorForeground, #f48771);
      --ok: var(--vscode-testing-iconPassed, #73c991);
      --menu-bg: var(--vscode-menu-background, #252526);
      --menu-fg: var(--vscode-menu-foreground, #cccccc);
      --menu-sel: var(--vscode-menu-selectionBackground, #094771);
      --menu-border: var(--vscode-menu-border, #454545);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      color: var(--fg);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    #header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-bottom: 1px solid var(--border); min-height: 36px;
    }
    #header h1 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--muted); flex: 1;
    }
    .icon-btn {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 12px;
    }
    .icon-btn:hover { background: var(--list-hover); color: var(--fg); }

    #ctx {
      display: none; padding: 6px 12px; font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--border); gap: 8px; align-items: center; flex-wrap: wrap;
    }
    #ctx.visible { display: flex; }
    #ctx .chip {
      background: var(--widget); border: 1px solid var(--border); border-radius: 12px;
      padding: 2px 8px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    #messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #empty {
      margin: auto; text-align: center; max-width: 320px; color: var(--muted); padding: 24px 8px;
    }
    #empty h2 { color: var(--fg); font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    #empty p { font-size: 12px; line-height: 1.5; margin-bottom: 12px; }
    #empty .tip {
      font-size: 11px; color: var(--muted); margin-bottom: 16px;
      background: var(--widget); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    }
    #empty kbd {
      font-family: inherit; font-size: 10px; border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; background: var(--input-bg);
    }
    .suggestions { display: flex; flex-direction: column; gap: 6px; }
    .suggestion {
      text-align: left; background: var(--widget); border: 1px solid var(--border);
      color: var(--fg); border-radius: 6px; padding: 8px 10px; font-size: 12px; cursor: pointer;
    }
    .suggestion:hover { border-color: var(--accent); }

    .msg .role { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--muted); }
    .msg.user .role { color: var(--accent); }
    .msg .body { line-height: 1.55; font-size: 13px; word-wrap: break-word; }
    .msg.user .body {
      background: var(--widget); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
    }
    .msg.assistant .body pre {
      background: var(--widget); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; overflow-x: auto; margin: 6px 0;
      font-family: var(--vscode-editor-font-family, ui-monospace, monospace); font-size: 12px;
    }

    .tool-card {
      align-self: stretch; background: var(--widget); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; font-size: 12px;
    }
    .tool-card header {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    }
    .tool-card header .name { font-weight: 600; flex: 1; }
    .tool-card header .status { font-size: 10px; color: var(--muted); }
    .tool-card.running header .status { color: var(--warn); }
    .tool-card.ok header .status { color: var(--ok); }
    .tool-card.err header .status { color: var(--error); }
    .tool-card .body {
      display: none; padding: 8px 10px; max-height: 180px; overflow: auto;
      font-family: var(--vscode-editor-font-family, ui-monospace, monospace);
      white-space: pre-wrap; color: var(--muted); font-size: 11px;
    }
    .tool-card.open .body { display: block; }
    .plan-card {
      background: var(--widget); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 12px;
    }
    .plan-card h3 { font-size: 12px; margin-bottom: 8px; color: var(--fg); }
    .plan-card li { margin: 4px 0 4px 16px; color: var(--muted); }

    .image-choice-card {
      align-self: stretch; background: color-mix(in srgb, #6366f1 12%, var(--widget));
      border: 1px solid color-mix(in srgb, #6366f1 35%, var(--border));
      border-radius: 10px; padding: 12px 14px; font-size: 12px;
    }
    .image-choice-card h3 { font-size: 13px; margin: 0 0 6px; color: var(--fg); }
    .image-choice-card p { margin: 0 0 10px; color: var(--muted); line-height: 1.4; }
    .image-choice-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .image-choice-btn {
      border: 1px solid var(--border); background: var(--widget); color: var(--fg);
      border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 12px;
    }
    .image-choice-btn:hover { border-color: #818cf8; }
    .image-choice-btn.locked { border-style: dashed; opacity: 0.85; }

    /* ── Cursor-style composer ── */
    #composer {
      border-top: 1px solid var(--border);
      padding: 10px 12px 12px;
      background: var(--bg);
      position: relative;
    }
    #composer-box {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #composer-box:focus-within { border-color: var(--accent); }
    #input {
      width: 100%; background: transparent; border: none; color: var(--input-fg);
      font: inherit; resize: none; min-height: 48px; max-height: 160px;
      outline: none; line-height: 1.45;
    }
    #composer-toolbar {
      display: flex; align-items: center; gap: 6px;
    }

    /* Mode trigger — Cursor pill */
    #mode-wrap { position: relative; }
    #mode-btn {
      display: inline-flex; align-items: center; gap: 5px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      padding: 4px 8px 4px 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      line-height: 1;
    }
    #mode-btn:hover, #mode-wrap.open #mode-btn {
      background: var(--list-hover);
      border-color: var(--border);
    }
    #mode-btn .mode-icon { font-size: 14px; line-height: 1; opacity: 0.9; }
    #mode-btn .chevron {
      font-size: 9px; color: var(--muted); margin-left: 1px;
    }

    /* Floating mode menu (opens upward like Cursor) */
    #mode-menu {
      display: none;
      position: absolute;
      left: 0;
      bottom: calc(100% + 6px);
      min-width: 220px;
      background: var(--menu-bg);
      color: var(--menu-fg);
      border: 1px solid var(--menu-border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      padding: 4px;
      z-index: 50;
    }
    #mode-wrap.open #mode-menu { display: block; }
    .mode-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      border: none; background: transparent;
      color: var(--menu-fg);
      text-align: left;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    .mode-item:hover, .mode-item:focus {
      background: var(--menu-sel);
      outline: none;
    }
    .mode-item .mi-icon {
      width: 18px; text-align: center; font-size: 14px; opacity: 0.9;
    }
    .mode-item .mi-label { flex: 1; font-weight: 500; }
    .mode-item .mi-kbd {
      font-size: 11px; color: var(--muted);
      font-family: inherit;
    }
    .mode-item .mi-check {
      width: 14px; color: var(--ok); font-size: 12px;
      visibility: hidden;
    }
    .mode-item.active .mi-check { visibility: visible; }
    .mode-item .mi-desc {
      display: none;
    }

    #provider-chip {
      border: none; background: transparent; color: var(--muted);
      font-size: 11px; padding: 4px 6px; border-radius: 6px;
      cursor: default; font-family: inherit; max-width: 110px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #toolbar-spacer { flex: 1; }
    #mcp-mini {
      border: none; background: transparent; color: var(--muted);
      padding: 4px 6px; border-radius: 6px; cursor: pointer; font-size: 12px;
      font-family: inherit;
    }
    #mcp-mini:hover { background: var(--list-hover); color: var(--fg); }

    #send, #stop {
      width: 28px; height: 28px; border-radius: 50%;
      border: none; cursor: pointer; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 14px; line-height: 1; font-family: inherit;
      padding: 0;
    }
    #send { background: var(--btn-bg); color: var(--btn-fg); }
    #send:hover { background: var(--btn-hover); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #stop {
      display: none; background: transparent; color: var(--fg);
      border: 1px solid var(--border);
    }
    body.streaming #send { display: none; }
    body.streaming #stop { display: inline-flex; }

    #mode-hint-row {
      font-size: 10px; color: var(--muted);
      padding: 0 2px; margin-top: 6px;
      display: flex; gap: 8px; align-items: center;
    }
    #mode-hint-row kbd {
      font-size: 9px; border: 1px solid var(--border);
      border-radius: 3px; padding: 0 4px; font-family: inherit;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Chat</h1>
    <button class="icon-btn" id="open-mcp" title="MCP Servers">MCP</button>
    <button class="icon-btn" id="new-chat" title="New Chat">＋</button>
  </div>

  <div id="ctx"><span class="chip" id="ctx-chip"></span></div>

  <div id="messages">
    <div id="empty">
      <h2>AIPiloty</h2>
      <p>One chat — Cursor-style Agent / Ask / Plan / Debug.</p>
      <div class="tip">
        Click <strong>∞ Agent</strong> below to switch modes, or press <kbd>⇧ Tab</kbd>.
        Close the right-hand Chat panel if it appears — use this sidebar only.
      </div>
      <div class="suggestions">
        <button class="suggestion" data-q="Explain this project structure" data-mode="ask">Ask: explain this project</button>
        <button class="suggestion" data-q="Make a plan to improve the desktop IDE chat UX" data-mode="plan">Plan: improve chat UX</button>
        <button class="suggestion" data-q="Debug why the backend only uses Ollama" data-mode="debug">Debug: provider chain</button>
      </div>
    </div>
  </div>

  <div id="composer">
    <div id="composer-box">
      <textarea id="input" rows="2" placeholder="Describe a task for the agent…"></textarea>
      <div id="composer-toolbar">
        <div id="mode-wrap">
          <button type="button" id="mode-btn" aria-haspopup="menu" aria-expanded="false" title="Switch mode (⇧Tab)">
            <span class="mode-icon" id="mode-icon">∞</span>
            <span id="mode-label">Agent</span>
            <span class="chevron">▾</span>
          </button>
          <div id="mode-menu" role="menu" aria-label="Chat mode">
            <button type="button" class="mode-item active" data-mode="agent" role="menuitem">
              <span class="mi-icon">∞</span>
              <span class="mi-label">Agent</span>
              <span class="mi-kbd"></span>
              <span class="mi-check">✓</span>
            </button>
            <button type="button" class="mode-item" data-mode="plan" role="menuitem">
              <span class="mi-icon">☰</span>
              <span class="mi-label">Plan</span>
              <span class="mi-kbd"></span>
              <span class="mi-check">✓</span>
            </button>
            <button type="button" class="mode-item" data-mode="debug" role="menuitem">
              <span class="mi-icon">🐞</span>
              <span class="mi-label">Debug</span>
              <span class="mi-kbd"></span>
              <span class="mi-check">✓</span>
            </button>
            <button type="button" class="mode-item" data-mode="ask" role="menuitem">
              <span class="mi-icon">💬</span>
              <span class="mi-label">Ask</span>
              <span class="mi-kbd"></span>
              <span class="mi-check">✓</span>
            </button>
          </div>
        </div>
        <span id="provider-chip" title="Provider chain">Auto</span>
        <span id="toolbar-spacer"></span>
        <button type="button" id="mcp-mini" title="MCP Servers">MCP</button>
        <button type="button" id="send" title="Send">↑</button>
        <button type="button" id="stop" title="Stop">■</button>
      </div>
    </div>
    <div id="mode-hint-row">
      <span id="mode-hint">Agent can use tools (terminal, files)</span>
      <span style="margin-left:auto"><kbd>⇧Tab</kbd> cycle modes</span>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    let mode = 'agent';
    let streaming = false;
    let assistantEl = null;
    let tokens = '';
    let activeToolCard = null;

    const MODE_ORDER = ['agent', 'plan', 'debug', 'ask'];
    const MODE_META = {
      agent: {
        icon: '✦',
        label: 'Agent',
        placeholder: 'Plan, search, build anything',
        hint: 'Plan, search, make edits, run commands',
      },
      plan: {
        icon: '☰',
        label: 'Plan',
        placeholder: 'Plan and design before coding...',
        hint: 'Generate an implementation plan',
      },
      debug: {
        icon: '🐞',
        label: 'Debug',
        placeholder: 'Debug and troubleshoot issues...',
        hint: 'Pinpoint the root cause of an issue',
      },
      ask: {
        icon: '💬',
        label: 'Ask',
        placeholder: 'Ask questions without making changes...',
        hint: 'Answer questions without making edits',
      },
    };

    const modeWrap = document.getElementById('mode-wrap');
    const modeBtn = document.getElementById('mode-btn');
    const modeMenu = document.getElementById('mode-menu');

    function setMode(m, opts) {
      if (!MODE_META[m]) return;
      mode = m;
      const meta = MODE_META[m];
      document.getElementById('mode-icon').textContent = meta.icon;
      document.getElementById('mode-label').textContent = meta.label;
      document.getElementById('input').placeholder = meta.placeholder;
      document.getElementById('mode-hint').textContent = meta.hint;
      document.querySelectorAll('.mode-item').forEach((b) => {
        b.classList.toggle('active', b.dataset.mode === m);
      });
      closeModeMenu();
      if (!opts || opts.notify !== false) {
        vscode.postMessage({ type: 'modeChanged', mode: m });
      }
    }

    function openModeMenu() {
      modeWrap.classList.add('open');
      modeBtn.setAttribute('aria-expanded', 'true');
    }
    function closeModeMenu() {
      modeWrap.classList.remove('open');
      modeBtn.setAttribute('aria-expanded', 'false');
    }
    function toggleModeMenu() {
      if (modeWrap.classList.contains('open')) closeModeMenu();
      else openModeMenu();
    }

    function cycleMode() {
      const i = MODE_ORDER.indexOf(mode);
      setMode(MODE_ORDER[(i + 1) % MODE_ORDER.length]);
    }

    modeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleModeMenu();
    });
    document.querySelectorAll('.mode-item').forEach((b) => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        setMode(b.dataset.mode);
      });
    });
    document.addEventListener('click', () => closeModeMenu());
    modeMenu.addEventListener('click', (e) => e.stopPropagation());

    document.querySelectorAll('.suggestion').forEach((b) => {
      b.addEventListener('click', () => {
        if (b.dataset.mode) setMode(b.dataset.mode, { notify: false });
        document.getElementById('input').value = b.dataset.q;
        send();
      });
    });
    document.getElementById('new-chat').onclick = () => vscode.postMessage({ type: 'newSession' });
    document.getElementById('open-mcp').onclick = () => vscode.postMessage({ type: 'openMcp' });
    document.getElementById('mcp-mini').onclick = () => vscode.postMessage({ type: 'openMcp' });
    document.getElementById('send').onclick = send;
    document.getElementById('stop').onclick = () => vscode.postMessage({ type: 'cancel' });

    const input = document.getElementById('input');
    input.addEventListener('keydown', (e) => {
      // Cursor: Shift+Tab cycles Agent → Plan → Debug → Ask
      if (e.key === 'Tab' && e.shiftKey) {
        e.preventDefault();
        cycleMode();
        return;
      }
      if (e.key === 'Escape') {
        closeModeMenu();
        return;
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
      requestAnimationFrame(() => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      });
    });

    function hideEmpty() {
      const empty = document.getElementById('empty');
      if (empty) empty.remove();
    }

    function send() {
      const text = input.value.trim();
      if (!text || streaming) return;
      hideEmpty();
      input.value = '';
      input.style.height = '48px';
      appendUser(text);
      vscode.postMessage({ type: 'send', text, mode });
    }

    function appendUser(text) {
      const el = document.createElement('div');
      el.className = 'msg user';
      el.innerHTML = '<div class="role">You · ' + MODE_META[mode].label + '</div><div class="body"></div>';
      el.querySelector('.body').textContent = text;
      document.getElementById('messages').appendChild(el);
      scroll();
    }

    function startAssistant() {
      assistantEl = document.createElement('div');
      assistantEl.className = 'msg assistant';
      assistantEl.innerHTML = '<div class="role">AIPiloty</div><div class="body"></div>';
      document.getElementById('messages').appendChild(assistantEl);
      tokens = '';
      setStreaming(true);
      scroll();
    }

    function looksLikeToolJson(text) {
      const t = text.trim();
      return t.startsWith('{') && (t.includes('"success"') || t.includes('"output"') || t.includes('needs_model_choice'));
    }

    function appendToken(t) {
      if (!assistantEl) startAssistant();
      tokens += t;
      if (looksLikeToolJson(tokens) && tokens.length < 4000) {
        assistantEl.querySelector('.body').innerHTML =
          '<em style="color:var(--muted)">Working with tools…</em>';
      } else {
        assistantEl.querySelector('.body').innerHTML = md(tokens);
      }
      scroll();
    }

    function toolCard(tool, state, detail) {
      if (state === 'start') {
        activeToolCard = document.createElement('div');
        activeToolCard.className = 'tool-card running';
        activeToolCard.innerHTML =
          '<header><span class="name"></span><span class="status">Running…</span></header><div class="body"></div>';
        activeToolCard.querySelector('.name').textContent = tool || 'tool';
        activeToolCard.querySelector('header').onclick = () => activeToolCard.classList.toggle('open');
        document.getElementById('messages').appendChild(activeToolCard);
        scroll();
        return;
      }
      const card = activeToolCard || document.createElement('div');
      if (!activeToolCard) {
        card.className = 'tool-card';
        card.innerHTML =
          '<header><span class="name"></span><span class="status"></span></header><div class="body"></div>';
        card.querySelector('.name').textContent = tool || 'tool';
        card.querySelector('header').onclick = () => card.classList.toggle('open');
        document.getElementById('messages').appendChild(card);
      }
      card.classList.remove('running');
      card.classList.add(state === 'error' ? 'err' : 'ok');
      card.querySelector('.status').textContent = state === 'error' ? 'Failed' : 'Done';
      if (detail) {
        let pretty = String(detail);
        try {
          const parsed = JSON.parse(pretty);
          if (parsed && typeof parsed === 'object') {
            if (parsed.output && parsed.output.message) pretty = parsed.output.message;
            else if (parsed.message) pretty = parsed.message;
            else pretty = JSON.stringify(parsed, null, 2);
          }
        } catch { /* keep raw */ }
        card.querySelector('.body').textContent = pretty.slice(0, 4000);
      }
      activeToolCard = null;
      scroll();
    }

    function renderImageChoice(root, tool) {
      if (activeToolCard) {
        activeToolCard.classList.remove('running');
        activeToolCard.classList.add('ok');
        activeToolCard.querySelector('.status').textContent = 'Needs choice';
        activeToolCard = null;
      }
      const el = document.createElement('div');
      el.className = 'image-choice-card';
      const title = root.status === 'needs_api_key' ? 'Image API key required' : 'Choose an image model';
      const msg = root.message || (root.status === 'needs_api_key'
        ? 'Add an OpenAI or Gemini key in Settings.'
        : 'Select a model to continue.');
      let buttons = '';
      const options = Array.isArray(root.options) ? root.options : [];
      if (root.status === 'needs_api_key' || !options.length) {
        buttons = '<button class="image-choice-btn" data-action="settings">Open Image Providers</button>';
      } else {
        buttons = options.map((o) => {
          const locked = o.available === false;
          const label = escapeHtml(String(o.label || o.id));
          if (locked) {
            return '<button class="image-choice-btn locked" data-action="settings">🔒 ' + label + '</button>';
          }
          return '<button class="image-choice-btn" data-action="model" data-model="' +
            escapeHtml(String(o.id)) + '">' + label + '</button>';
        }).join('');
      }
      el.innerHTML =
        '<h3>' + escapeHtml(title) + '</h3><p>' + escapeHtml(String(msg)) + '</p><div class="image-choice-btns">' +
        buttons + '</div>';
      el.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (btn.dataset.action === 'settings') {
            vscode.postMessage({ type: 'openImageSettings' });
            return;
          }
          const model = btn.dataset.model;
          if (!model) return;
          const prompt =
            'Generate the image now using model "' + model + '" (do not ask again).';
          hideEmpty();
          appendUser(prompt);
          vscode.postMessage({ type: 'send', text: prompt, mode });
        });
      });
      document.getElementById('messages').appendChild(el);
      scroll();
    }

    function planCard(steps) {
      const el = document.createElement('div');
      el.className = 'plan-card';
      const list = (steps || []).map((s) => {
        const label = typeof s === 'string' ? s : (s.title || s.text || JSON.stringify(s));
        return '<li>' + escapeHtml(String(label)) + '</li>';
      }).join('');
      el.innerHTML = '<h3>Plan</h3><ol>' + list + '</ol>';
      document.getElementById('messages').appendChild(el);
      scroll();
    }

    function setStreaming(v) {
      streaming = v;
      document.body.classList.toggle('streaming', v);
      document.getElementById('send').disabled = v;
    }

    function scroll() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function md(text) {
      return escapeHtml(text)
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function renderEmpty() {
      document.getElementById('messages').innerHTML =
        '<div id="empty"><h2>AIPiloty</h2>' +
        '<p>One chat — Cursor-style Agent / Ask / Plan / Debug.</p>' +
        '<div class="tip">Click <strong>∞ Agent</strong> below to switch modes, or press <kbd>⇧ Tab</kbd>.</div>' +
        '<div class="suggestions">' +
        '<button class="suggestion" data-q="Explain this project structure" data-mode="ask">Ask: explain this project</button>' +
        '<button class="suggestion" data-q="Make a plan to improve the desktop IDE chat UX" data-mode="plan">Plan: improve chat UX</button>' +
        '<button class="suggestion" data-q="Debug why the backend only uses Ollama" data-mode="debug">Debug: provider chain</button>' +
        '</div></div>';
      document.querySelectorAll('.suggestion').forEach((b) => {
        b.addEventListener('click', () => {
          if (b.dataset.mode) setMode(b.dataset.mode, { notify: false });
          document.getElementById('input').value = b.dataset.q;
          send();
        });
      });
    }

    window.addEventListener('message', (event) => {
      const msg = event.data;
      switch (msg.type) {
        case 'token':
          hideEmpty();
          appendToken(msg.token || '');
          if (msg.done) { setStreaming(false); assistantEl = null; tokens = ''; }
          break;
        case 'thinking':
          hideEmpty();
          if (!assistantEl) startAssistant();
          break;
        case 'planning':
          if (Array.isArray(msg.steps) && msg.steps.length) planCard(msg.steps);
          break;
        case 'tool_start':
          toolCard(msg.tool, 'start');
          break;
        case 'tool_output':
          if (msg.tool === 'generate_image') {
            try {
              const parsed = typeof msg.output === 'string' ? JSON.parse(msg.output) : msg.output;
              const root = parsed && parsed.output && typeof parsed.output === 'object' ? parsed.output : parsed;
              if (root && (root.status === 'needs_model_choice' || root.status === 'needs_api_key')) {
                renderImageChoice(root, msg.tool);
                break;
              }
            } catch { /* fall through */ }
          }
          toolCard(msg.tool, 'ok', msg.output);
          break;
        case 'tool_error':
          toolCard(msg.tool, 'error', msg.error);
          break;
        case 'approval_required':
          toolCard(msg.tool || 'tool', 'start');
          if (activeToolCard) {
            activeToolCard.classList.remove('running');
            activeToolCard.querySelector('.status').textContent = 'Needs approval';
            activeToolCard.querySelector('.body').textContent =
              (msg.explanation || '') + '\n' + JSON.stringify(msg.args || {}, null, 2);
            activeToolCard.classList.add('open');
          }
          break;
        case 'provider_switched':
          if (msg.active) {
            document.getElementById('provider-chip').textContent = String(msg.active);
          }
          break;
        case 'provider_status':
          if (msg.label) {
            document.getElementById('provider-chip').textContent = String(msg.label);
          }
          break;
        case 'error':
          setStreaming(false);
          toolCard('error', 'error', msg.message || 'Error');
          break;
        case 'done':
          setStreaming(false);
          assistantEl = null;
          tokens = '';
          break;
        case 'newSession':
          renderEmpty();
          assistantEl = null;
          tokens = '';
          setStreaming(false);
          break;
        case 'externalSend':
          hideEmpty();
          appendUser(msg.text || '');
          break;
        case 'setMode':
          if (msg.mode) setMode(String(msg.mode), { notify: false });
          break;
        case 'context':
          if (msg.filename) {
            document.getElementById('ctx').classList.add('visible');
            let t = msg.filename;
            if (msg.language) t += ' · ' + msg.language;
            if (msg.selection) t += ' · selection';
            document.getElementById('ctx-chip').textContent = t;
          }
          break;
      }
    });

    setMode('agent', { notify: false });
    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
